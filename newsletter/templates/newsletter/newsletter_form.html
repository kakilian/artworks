<form method="post" action="{% url 'newsletter:subscribe' %}">
  {% csrf_token %}
  <input type="email" name="email" class="form-control mb-2" placeholder="Enter your email" required>
  <button type="submit" class="btn btn-dark w-100">Sign Up</button>
  <small class="form-text text-muted mt-1">No spam. Unsubscribe anytime.</small>
</form>
