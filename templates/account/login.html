{% extends 'artworks/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="signup-wrapper">

    <div class="auth-form">
      <h2>Login</h2>
      <form method="post" action="{% url 'account_login' %}">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-dark w-100 mt-3">Log In</button>
      </form>

      <p class="mt-3 text-center">
        <a href="{% url 'account_reset_password' %}">Forgot your password?</a>
      </p>

      <p class="text-center">
        Don’t have an account?
        <a href="{% url 'account_signup' %}">Sign up</a>
      </p>

      <p class="text-center mt-4">
        <a href="{% url 'home' %}">← Back to Home</a>
      </p>
    </div>

    <div class="auth-image">
      <img src="https://res.cloudinary.com/dnpiqghrn/image/upload/v1750505289/signup_wyhbh7.jpg" alt="Colorful female portrait" />
      <p style="text-align: center; font-size: 0.9rem;">
        Art begins with the courage to show up.
      </p>
    </div>

  </div>
{% endblock %}
