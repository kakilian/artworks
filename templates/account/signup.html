<!-- templates/account/signup.html -->
{% extends "artworks/base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="signup-wrapper">

    <div class="auth-form">
      <h2>Sign Up</h2>

      <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-dark w-100 mt-3">Sign Up</button>
      </form>

      <p class="mt-3 text-center">
        Already have an account?
        <a href="{% url 'account_login' %}">Log in</a>
      </p>
    </div>

    <div class="auth-image">
      <img src="https://res.cloudinary.com/dnpiqghrn/image/upload/v1750505289/signup_wyhbh7.jpg" alt="Colorful female portrait" />
      <p style="text-align: center; font-size: 0.9rem;">
        A vivid moment of creative expression
      </p>
    </div>

  </div>
{% endblock %}
