{% extends 'artworks/base.html' %}
{% load static %}

{% block content %}
<section class="text-center my-5">
    <h2 class="text-success fw-bold">Meet the Artists</h2>
    <p class="lead">Explore the talented minds behind our collection.</p>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 mt-4">
        {% for artist in artists %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                {% if artist.image %}
                <img src="{{ artist.image.url }}" class="card-img-top" alt="{{ artist.name }}">
                {% else %}
                <img src="{% static 'images/placeholder.png' %}" class="card-img-top" alt="No Image">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ artist.name }}</h5>
                    <p class="card-text">{{ artist.bio|truncatewords:30 }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
