<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Artworks{% endblock %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        {% load static %}
        
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
        <!-- Bootstrap 5 CDN for Carousel -->
        {% block extra_css %}
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        {% endblock %}
    </head>
    
    <body>
        <!-- Navbar Global -->
        <div class="header">
            <h1 style="margin:0;">Artworks</h1>
            <nav class="nav-menu">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'artworks_list' %}">Artworks</a>
                <a href="#">Artists</a>
                <div class="dropdown">
                    <button class="dropbtn">Coming Up Events</button>
                    <div class="dropdown-content">
                        <a href="#">Exhibitions</a>
                        <a href="#">Workshops</a>
                    </div>
                </div>
            </nav>
        </div>
    <div class="container">
    {% block content %}

    {% endblock %}
    </div>
    <!-- Footer Global-->
    {% include 'artworks/footer.html' %}
    <div class="footer">
        © 2024 Artworks — <a href="#">Privacy</a> | <a href="#">Terms</a> | <a href="#">Contact</a>
    </div>
    
    <!-- Bootstrap 5 JS for Carousel -->
    {% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% endblock %}
</body>
</html>
