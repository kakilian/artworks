{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Katarina" />
    <meta name="description" content="Explore a curated collection of artworks from various artists. Discover, filter, and purchase unique pieces that resonate with your taste." />
    <meta name="keywords" content="artworks, artists, paintings, sculptures, art gallery, online art store" />
    <title>{% block title %}Artworks{% endblock %}</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />

    <!-- Favicons -->
    <link rel="shortcut icon" href="{% static images/favicon/favicon.ico' %}" type="image/x-icon" />
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}" />
    <link rel="manifest" href="{% static 'images/favicon/site.webmanifest' %}" />

    <!-- Bootstrap CSS -->
    {% block extra_css %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    {% endblock %}
</head>

<body>
    <!-- Navbar Global -->
    <header class="header d-flex align-items-center">
        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo/logo.png' %}" alt="Artworks Logo" style="height: 100px; margin-right: 20px;" />
        </a>
        <h1 style="margin:0;"></h1>
        <nav class="nav-menu">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'artworks_list' %}">Artworks</a>
            <a href="#">Artists</a>
            <div class="dropdown">
                <button class="dropbtn">Coming Up Events</button>
                <div class="dropdown-content">
                    <a href="#">Exhibitions</a>
                    <a href="#">Workshops</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        {% block content %}
        <!-- Main content goes here -->
        {% endblock %}
    </main>

    {% include 'artworks/footer.html' %}

    <footer>
        
    </footer>

    <!-- Bootstrap JS Bundle -->
    {% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    {% endblock %}
</body>
</html>
